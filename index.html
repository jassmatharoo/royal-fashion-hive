<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Royal Fashion Hive — Punjabi suits, ladies designer wear, handbags, Punjabi Jutti and Sikh essentials in Craigieburn VIC."/>
  <title>Royal Fashion Hive — Where Trends Buzz With Style</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body>

<nav id="site-nav"></nav>

<section id="hero">
  <div class="hero-bg"></div>
  <div class="hero-lines"></div>
  <div class="hero-hex">

    <div class="hex"></div><div class="hex"></div><div class="hex"></div><div class="hex"></div><div class="hex"></div>

    <div class="hex"></div><div class="hex"></div><div class="hex"></div><div class="hex"></div><div class="hex"></div>
  </div>
  <div id="hero-content"></div>
</section>

<div class="marquee-strip"><div class="marquee-track" id="marquee-track"></div></div>

<section id="about"><div id="about-content"></div></section>

<section id="services">
  <div class="section-header reveal">
    <p class="section-label">What We Stock</p>
    <h2>Our Full Range of <em>Products</em></h2>
    <div class="divider"></div>
  </div>
  <div id="services-grid"></div>
</section>

<section id="catalogue">
  <div class="section-header reveal">
    <p class="section-label">Browse Products</p>
    <h2>Our Royal <em>Catalogue</em></h2>
    <div class="divider"></div>
  </div>
  <div id="catalogue-filters"></div>
  <div id="catalogue-grid"></div>
</section>

<section id="testimonials">
  <div class="section-header reveal">
    <p class="section-label">Customer Reviews</p>
    <h2>The Royal <em>Experience</em></h2>
    <div class="divider"></div>
  </div>
  <div id="testimonials-grid"></div>
</section>

<section id="pricing">
  <div class="section-header reveal">
    <p class="section-label">Special Offers</p>
    <h2>Exclusive <em>Deals</em> for Our Valued Customers</h2>
    <div class="divider"></div>
  </div>
  <div id="pricing-grid"></div>
</section>

<section id="contact">
  <div class="section-header reveal">
    <p class="section-label">Find Us</p>
    <h2>Get in <em>Touch</em></h2>
    <div class="divider"></div>
  </div>
  <div id="contact-content"></div>

<footer><div id="footer-content"></div></footer>

<div id="whatsapp-slider"></div>
